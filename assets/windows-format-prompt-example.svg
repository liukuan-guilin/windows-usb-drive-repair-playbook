<svg xmlns="http://www.w3.org/2000/svg" width="536" height="245" viewBox="0 0 536 245" role="img" aria-labelledby="title desc">
  <title id="title">Windows format prompt example</title>
  <desc id="desc">A Windows dialog that says the disk in drive needs to be formatted before use.</desc>
  <rect width="536" height="245" rx="14" fill="#f3f4f6"/>
  <rect x="6" y="6" width="524" height="233" rx="12" fill="#ffffff" stroke="#d1d5db"/>
  <text x="18" y="34" fill="#111827" font-size="17" font-family="Segoe UI, Arial, sans-serif">Microsoft Windows</text>
  <line x1="6" y1="48" x2="530" y2="48" stroke="#e5e7eb"/>

  <text x="18" y="84" fill="#1d4ed8" font-size="20" font-family="Segoe UI, Arial, sans-serif">
    使用驱动器 F: 中的光盘之前需要将其格式化。
  </text>
  <text x="18" y="122" fill="#111827" font-size="15" font-family="Segoe UI, Arial, sans-serif">
    是否要将其格式化?
  </text>

  <rect x="260" y="183" width="112" height="40" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="282" y="208" fill="#111827" font-size="15" font-family="Segoe UI, Arial, sans-serif">格式化磁盘</text>

  <rect x="388" y="183" width="96" height="40" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="421" y="208" fill="#111827" font-size="15" font-family="Segoe UI, Arial, sans-serif">取消</text>

  <circle cx="502" cy="25" r="10" fill="#f3f4f6"/>
  <path d="M497 20 L507 30 M507 20 L497 30" stroke="#6b7280" stroke-width="1.8" stroke-linecap="round"/>
</svg>
